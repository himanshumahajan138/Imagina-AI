# Model registry for Imagina AI.
#
# Three tiers per modality:
#   - local      : runs on user's machine (M2 16 GB target)
#   - cloud_oss  : OSS model served by managed provider (Replicate / fal.ai)
#   - api        : proprietary API (OpenAI / Gemini / Sync.so)
#
# `requires_env` lists env vars that must be set for the backend to be
# selectable. Selection prefers api → cloud_oss → local when tier=auto.

llm:
  default_tier: auto
  models:
    qwen-2.5-7b:
      tier: local
      backend: mlx_local
      ram_gb: 6
      hf_id: mlx-community/Qwen2.5-7B-Instruct-4bit
    deepseek-v3:
      tier: cloud_oss
      backend: replicate
      replicate_id: deepseek-ai/deepseek-v3
      requires_env: REPLICATE_API_TOKEN
    gemini-3.1-flash-lite:
      tier: api
      backend: gemini
      requires_env: GOOGLE_GENAI_API_KEY
    gpt-5.4-mini:
      tier: api
      backend: openai
      requires_env: OPENAI_API_KEY

image:
  default_tier: auto
  models:
    # Listed first → auto-pick prefers it within the local tier.
    # ~7 GB on disk; reasonable quality with the bumped settings below.
    sdxl-turbo:
      tier: local
      backend: coreml_local
      hf_id: stabilityai/sdxl-turbo
      ram_gb: 8
      # Quality-leaning defaults. Official Turbo recipe is 1 step +
      # guidance=0.0 (~8s/image on M2). 4 steps + guidance=0.0 produces
      # noticeably more detail at ~25s/image — same compute budget as
      # SDXL Lightning. Drop to 1 / 0.0 if you'd rather have speed.
      num_inference_steps: 4
      guidance_scale: 0.0
      # Optional: swap the VAE for madebyollin's fp16-fixed version
      # (more accurate decoding, ~325 MB extra download). Uncomment to
      # enable.
      # vae_id: madebyollin/sdxl-vae-fp16-fix
      # SDXL-Turbo is square-trained; non-square output degrades fast.
      supported_dimensions: ["1024x1024"]
    # Tongyi-MAI's 6B S3-DiT, 8-step distilled, bf16. Best quality of
    # the local image options but ~33 GB on disk. Selectable from the
    # sidebar; not the auto-pick default.
    z-image-turbo:
      tier: local
      backend: zimage_local
      hf_id: Tongyi-MAI/Z-Image-Turbo
      ram_gb: 12
      num_inference_steps: 9   # 9 results in 8 DiT forward passes
      cpu_offload: false       # flip to true on tight memory; slower
      supported_dimensions: ["1024x1024", "1024x1536", "1536x1024"]
    flux-dev:
      tier: cloud_oss
      backend: replicate
      replicate_id: black-forest-labs/flux-dev
      requires_env: REPLICATE_API_TOKEN
    # Free-tier Gemini multimodal image gen (Nano Banana). Listed before
    # imagen-4 so auto-pick prefers the free path when GOOGLE_GENAI_API_KEY
    # is set.
    gemini-2.5-flash-image:
      tier: api
      backend: gemini_flash_image
      model: gemini-2.5-flash-image
      requires_env: GOOGLE_GENAI_API_KEY
    imagen-4:
      tier: api
      backend: gemini
      requires_env: GOOGLE_GENAI_API_KEY
    gpt-image-2:
      tier: api
      backend: openai
      requires_env: OPENAI_API_KEY

video:
  default_tier: auto
  models:
    ltx-video-2b:
      tier: local
      backend: ltx_local
      hf_id: Lightricks/LTX-Video
      ram_gb: 12
      scene_duration: 10
      fps: 24
      num_inference_steps: 30
      # LTX-Video 2B targets 768×512 internally; we only expose the closest
      # square preset to keep aspect-ratio handling sane downstream.
      # The backend rounds to multiples of 32 internally.
      supported_dimensions: ["1024x1024"]
    wan-2.1:
      tier: cloud_oss
      backend: replicate
      replicate_id: wavespeedai/wan-2.1-i2v-720p
      requires_env: REPLICATE_API_TOKEN
      scene_duration: 10
    hunyuan-video:
      tier: cloud_oss
      backend: replicate
      replicate_id: tencent/hunyuan-video
      requires_env: REPLICATE_API_TOKEN
      scene_duration: 10
    veo-3.1:
      tier: api
      backend: google_flow
      requires_env: GOOGLE_GENAI_API_KEY
      scene_duration: 8
      produces_audio: true
    sora-2:
      tier: api
      backend: openai
      requires_env: OPENAI_API_KEY
      scene_duration: 12

lipsync:
  default_tier: auto
  models:
    wav2lip:
      tier: local
      backend: wav2lip_local
      ram_gb: 1
      ckpt_path: models/wav2lip.onnx
      # Auto-pick will land here when no SYNC_API_KEY / REPLICATE_API_TOKEN
      # is set. The backend gracefully raises BackendUnavailable if either
      # onnxruntime is missing or the .onnx checkpoint isn't downloaded.
    latentsync:
      tier: cloud_oss
      backend: replicate
      replicate_id: bytedance/latentsync
      requires_env: REPLICATE_API_TOKEN
    sync-so:
      tier: api
      backend: sync_api
      requires_env: SYNC_API_KEY

tts:
  default_tier: auto
  models:
    kokoro:
      tier: local
      backend: kokoro_local
      ram_gb: 1
    f5-tts:
      tier: cloud_oss
      backend: replicate
      replicate_id: x-lance/f5-tts
      requires_env: REPLICATE_API_TOKEN
    elevenlabs:
      tier: api
      backend: elevenlabs
      requires_env: ELEVENLABS_API_KEY
